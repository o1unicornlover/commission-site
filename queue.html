<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commission Queue</title>
  <link rel="stylesheet" href="style.css?v=ui22" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">YourName Commissions</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="pricing.html">Pricing</a>
      <a href="queue.html">Queue</a>
      <a href="gallery.html">Gallery</a>
      <a href="tos.html">TOS</a>
    </nav>
  </header>

  <main>
    <section class="panel compact-panel">
      <div class="section-title">
        <div>
          <p class="eyebrow">Current workload</p>
          <h1 class="page-title">Waiting List</h1>
        </div>
        <span id="queueCount" class="pill">0 active</span>
      </div>
      <div id="queueGrid" class="queue-grid"></div>
    </section>
  </main>

  <div id="passwordModal" class="modal hidden">
    <div class="modal-card">
      <button class="close" onclick="closeModal()">×</button>
      <h2>Access Progress</h2>
      <p>Enter the password you received. This will open a separate progress page.</p>
      <input id="clientPassword" type="password" placeholder="Password" />
      <button class="btn primary" onclick="checkPassword()">Open Progress Page</button>
      <p id="passwordError" class="error"></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
<script src="./sb-api.js?v=10"></script>
<script src="script.js?v=ui28"></script>
</body>
</html>
